services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sicof_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: sicof
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sicof2026
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sicof"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescaledb_data:
    driver: local
